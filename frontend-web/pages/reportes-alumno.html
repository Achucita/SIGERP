<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SIGERP — Reportes del alumno</title>
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/components.css">
</head>
<body>

<div class="app-layout">
  <nav class="sidebar" id="sidebar"></nav>

  <div class="app-main">
    <header class="topbar">
      <div class="topbar-title" id="topbar-titulo">Reportes del alumno</div>
      <div class="topbar-actions">
        <a href="mis-alumnos.html" class="btn btn-secondary btn-sm">← Mis alumnos</a>
      </div>
    </header>

    <main class="app-content">

      <!-- Selector de proyecto si no viene por URL -->
      <div id="bloque-selector" class="card" style="display:none">
        <div class="card-body">
          <div class="form-group">
            <label class="form-label">Seleccionar proyecto</label>
            <select class="form-control" id="select-proyecto" onchange="cargarReportes()">
              <option value="">— Seleccionar —</option>
            </select>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <span class="card-title" id="card-title">Reportes de avance</span>
          <div class="tab-pills">
            <button class="tab-pill active" onclick="setFiltro('', this)">Todos</button>
            <button class="tab-pill" onclick="setFiltro('enviado', this)">Pendientes</button>
            <button class="tab-pill" onclick="setFiltro('revisado', this)">Revisados</button>
            <button class="tab-pill" onclick="setFiltro('con_observaciones', this)">Con observaciones</button>
          </div>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>#</th>
                <th>Alumno</th>
                <th>Título</th>
                <th>Período</th>
                <th>Fecha envío</th>
                <th>Estado</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody id="tbody-rep">
              <tr class="loading-row">
                <td colspan="7"><div class="spinner"></div></td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

    </main>
  </div>
</div>

<!-- Modal: comentar reporte -->
<div class="modal-overlay" id="modal-comentar">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Revisar reporte</span>
      <button class="modal-close" onclick="closeModal('modal-comentar')">×</button>
    </div>
    <div class="modal-body">
      <div style="margin-bottom:14px">
        <div class="form-label">Reporte</div>
        <div id="c-titulo" style="font-size:14px;font-weight:600"></div>
        <div id="c-alumno" class="text-sm text-muted"></div>
      </div>
      <div class="form-group">
        <label class="form-label">Estado <span class="req">*</span></label>
        <select class="form-control" id="c-estado">
          <option value="revisado">Revisado — sin observaciones</option>
          <option value="con_observaciones">Con observaciones</option>
        </select>
      </div>
      <div class="form-group mt-8">
        <label class="form-label">Comentarios para el alumno</label>
        <textarea class="form-control" id="c-comentario"
                  placeholder="Escribe tu retroalimentación…" rows="4"></textarea>
      </div>
      <input type="hidden" id="c-id" />
      <div class="form-footer">
        <button class="btn btn-secondary" onclick="closeModal('modal-comentar')">Cancelar</button>
        <button class="btn btn-primary" id="btn-comentar" onclick="guardarComentario()">
          💾 Guardar revisión
        </button>
      </div>
    </div>
  </div>
</div>

<div id="toast-container"></div>

<script src="../js/auth.js"></script>
<script src="../js/api/client.js"></script>
<script src="../js/components/sidebar.js"></script>
<script>
  checkAuth(['asesor']);
  renderSidebar('reportes-alumno.html');

  let _todos   = [];
  let _filtroE = '';

  // Leer idProyecto de la URL si viene desde mis-alumnos
  const params    = new URLSearchParams(window.location.search);
  const idProyURL = params.get('proyecto') ? parseInt(params.get('proyecto')) : null;

  async function init() {
    if (idProyURL) {
      cargarReportes(idProyURL);
    } else {
      // Mostrar selector de proyecto
      document.getElementById('bloque-selector').style.display = 'block';
      tablaEmpty('tbody-rep', 'Selecciona un proyecto para ver sus reportes.', 7);
      const perfil    = await usuariosApi.perfil();
      const proyectos = await proyectosApi.listar();
      const misProy   = proyectos.filter(p => p.asesor === perfil.nombre);
      const sel       = document.getElementById('select-proyecto');
      sel.innerHTML   = '<option value="">— Seleccionar proyecto —</option>' +
        misProy.map(p => `<option value="${p.id_proyecto}">${p.nombre}</option>`).join('');
    }
  }

  async function cargarReportes(idProy) {
    const id = idProy || parseInt(document.getElementById('select-proyecto').value);
    if (!id) return;
    tablaLoading('tbody-rep', 7);
    try {
      _todos = await reportesApi.porProyecto(id);
      document.getElementById('card-title').textContent =
        `Reportes de avance (${_todos.length})`;
      renderTabla(aplicarFiltro());
    } catch (err) {
      tablaEmpty('tbody-rep', `Error: ${err.message}`, 7);
      toast(err.message, 'error');
    }
  }

  function setFiltro(est, btn) {
    _filtroE = est;
    document.querySelectorAll('.tab-pill').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderTabla(aplicarFiltro());
  }

  function aplicarFiltro() {
    return _filtroE ? _todos.filter(r => r.estado === _filtroE) : _todos;
  }

  function renderTabla(lista) {
    if (!lista.length) {
      return tablaEmpty('tbody-rep', 'Sin reportes en este estado.', 7);
    }
    document.getElementById('tbody-rep').innerHTML = lista.map(r => `
      <tr>
        <td class="text-muted text-sm">#${r.numero_reporte}</td>
        <td>
          <div class="avatar-row">
            <div class="avatar">${iniciales(r.alumno || '?')}</div>
            <div>
              <div class="td-name">${r.alumno || '—'}</div>
              <div class="td-sub">${r.matricula || ''}</div>
            </div>
          </div>
        </td>
        <td>
          <div class="td-name">${r.titulo}</div>
          ${r.comentario_asesor
            ? `<div class="td-sub" style="color:var(--teal-l)">"${r.comentario_asesor.slice(0,60)}…"</div>`
            : ''}
        </td>
        <td class="text-sm text-muted">
          ${fmtFecha(r.periodo_inicio)} – ${fmtFecha(r.periodo_fin)}
        </td>
        <td class="text-sm text-muted">${fmtFecha(r.fecha_envio)}</td>
        <td>${badgeEstado(r.estado)}</td>
        <td>
          <div class="td-actions">
            <button class="btn btn-sm btn-secondary"
                    onclick="abrirComentario(${r.id_reporte}, '${r.titulo.replace(/'/g,"\\'")}',
                      '${(r.alumno||'').replace(/'/g,"\\'")}', '${r.estado}',
                      '${(r.comentario_asesor||'').replace(/'/g,"\\'")}')">
              ${r.estado === 'enviado' ? 'Revisar' : 'Editar revisión'}
            </button>
          </div>
        </td>
      </tr>
    `).join('');
  }

  // ── Modal comentar ────────────────────────────────────────────
  function abrirComentario(id, titulo, alumno, estado, comentarioPrev) {
    document.getElementById('c-id').value         = id;
    document.getElementById('c-titulo').textContent = titulo;
    document.getElementById('c-alumno').textContent = alumno;
    document.getElementById('c-estado').value     =
      estado === 'enviado' ? 'revisado' : estado;
    document.getElementById('c-comentario').value  = comentarioPrev || '';
    openModal('modal-comentar');
  }

  async function guardarComentario() {
    const id        = parseInt(document.getElementById('c-id').value);
    const estado    = document.getElementById('c-estado').value;
    const comentario = document.getElementById('c-comentario').value.trim();
    const btn       = document.getElementById('btn-comentar');

    btn.disabled = true;
    btn.textContent = 'Guardando…';
    try {
      await reportesApi.comentar(id, { estado, comentario });
      toast('Revisión guardada. El alumno fue notificado.');
      closeModal('modal-comentar');
      cargarReportes(idProyURL);
    } catch (err) {
      toast(err.message, 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = '💾 Guardar revisión';
    }
  }

  document.querySelectorAll('.modal-overlay').forEach(o =>
    o.addEventListener('click', e => { if (e.target === o) o.classList.remove('open'); })
  );

  init();
</script>
</body>
</html>
