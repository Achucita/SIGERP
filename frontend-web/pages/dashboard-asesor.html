<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="../favicon.jpg">
  <link rel="shortcut icon" href="../favicon.jpg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SIGERP — Dashboard Asesor</title>
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/components.css">
</head>
<body>

<div class="app-layout">
  <nav class="sidebar" id="sidebar"></nav>

  <div class="app-main">
    <header class="topbar">
      <div class="topbar-title">Dashboard</div>
    </header>

    <main class="app-content">

      <!-- Banner de bienvenida -->
      <div class="profile-banner" id="profile-banner">
        <div class="avatar-lg" id="banner-av">—</div>
        <div>
          <div class="profile-name" id="banner-nombre">Cargando…</div>
          <div class="profile-meta" id="banner-area">Asesor Académico</div>
          <div class="profile-tags" id="banner-tags"></div>
        </div>
      </div>

      <!-- Stats -->
      <div class="stats-grid" style="grid-template-columns:repeat(3,1fr);margin-bottom:20px">
        <div class="stat-card c-teal">
          <div class="stat-label">Anteproyectos por revisar</div>
          <div class="stat-value" id="s-antep">—</div>
        </div>
        <div class="stat-card c-warn">
          <div class="stat-label">Evidencias sin retroalimentación</div>
          <div class="stat-value" id="s-evidencias">—</div>
        </div>
        <div class="stat-card c-accent">
          <div class="stat-label">Evaluaciones emitidas</div>
          <div class="stat-value" id="s-eval">—</div>
        </div>
      </div>

      <div class="two-col">

        <!-- Anteproyectos asignados pendientes de revisar -->
        <div class="card">
          <div class="card-header">
            <span class="card-title">Anteproyectos por revisar</span>
            <a href="anteproyectos-asesor.html" class="btn btn-sm btn-secondary">Ver todos</a>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Alumno</th>
                  <th>Título</th>
                  <th>Acciones</th>
                </tr>
              </thead>
              <tbody id="tbody-antep">
                <tr class="loading-row"><td colspan="3"><div class="spinner"></div></td></tr>
              </tbody>
            </table>
          </div>
        </div>

        <!-- Evidencias recientes sin retroalimentación -->
        <div class="card">
          <div class="card-header">
            <span class="card-title">Evidencias sin retroalimentación</span>
            <a href="evidencias-asesor.html" class="btn btn-sm btn-secondary">Ver todas</a>
          </div>
          <div id="lista-evidencias">
            <div style="padding:20px;text-align:center"><div class="spinner"></div></div>
          </div>
        </div>

      </div>

    </main>
  </div>
</div>

<div id="toast-container"></div>

<script src="../js/auth.js"></script>
<script src="../js/api/client.js"></script>
<script src="../js/components/sidebar.js"></script>
<script>
  checkAuth(['asesor']);
  renderSidebar('dashboard-asesor.html');

  async function cargarDashboard() {
    try {
      // Perfil del asesor logueado
      const perfil = await usuariosApi.perfil();
      document.getElementById('banner-av').textContent     = iniciales(perfil.nombre);
      document.getElementById('banner-nombre').textContent = perfil.nombre;
      document.getElementById('banner-area').textContent   =
        `Asesor Académico · ${perfil.area || 'Departamento de Sistemas'}`;

      // Anteproyectos asignados a este asesor
      const anteps    = await anteproyectosApi.misAsignados();
      const porRevisar = anteps.filter(a => a.estado === 'asignado');
      document.getElementById('s-antep').textContent = porRevisar.length;

      document.getElementById('banner-tags').innerHTML = [
        `${anteps.length} anteproyecto(s) asignado(s)`,
        `${porRevisar.length} por revisar`,
      ].map(t => `<span class="profile-tag">${t}</span>`).join('');

      // Tabla de anteproyectos por revisar (máx 5)
      if (!porRevisar.length) {
        tablaEmpty('tbody-antep', 'Sin anteproyectos por revisar.', 3);
      } else {
        document.getElementById('tbody-antep').innerHTML = porRevisar.slice(0, 5).map(a => `
          <tr>
            <td>
              <div class="avatar-row">
                <div class="avatar">${iniciales(a.alumno || '?')}</div>
                <div>
                  <div class="td-name">${a.alumno}</div>
                  <div class="td-sub">${a.matricula || ''}</div>
                </div>
              </div>
            </td>
            <td class="td-name" style="max-width:180px;white-space:nowrap;
                overflow:hidden;text-overflow:ellipsis" title="${a.titulo}">
              ${a.titulo}
            </td>
            <td>
              <a href="anteproyectos-asesor.html" class="btn btn-sm btn-primary">Revisar</a>
            </td>
          </tr>
        `).join('');
      }

      // Evidencias sin retroalimentación
      document.getElementById('s-evidencias').textContent = '—';
      const listaEl = document.getElementById('lista-evidencias');

      try {
        const todasEvid = await evidenciasApi.porAsesor();
        const sinComent = todasEvid.filter(e => !e.comentario_asesor);
        document.getElementById('s-evidencias').textContent = sinComent.length;

        if (!sinComent.length) {
          listaEl.innerHTML = `
            <div class="empty-state" style="padding:30px">
              <div class="empty-state-icon">📎</div>
              <p>Sin evidencias pendientes de retroalimentación</p>
            </div>`;
        } else {
          listaEl.innerHTML = sinComent.slice(0, 5).map(e => `
            <div class="activity-item">
              <div class="activity-dot" style="background:var(--accent)"></div>
              <div class="activity-text">
                <strong>${e.alumno || 'Alumno'}</strong>
                <div class="text-sm text-muted">${e.descripcion || 'Sin descripción'} · ${fmtFecha(e.fecha_envio)}</div>
              </div>
              <a href="evidencias-asesor.html?alumno=${e.id_alumno}&nombre=${encodeURIComponent(e.alumno || '')}"
                 class="btn btn-sm btn-primary">Comentar</a>
            </div>
          `).join('');
        }
      } catch (_) {
        listaEl.innerHTML = `
          <div class="empty-state" style="padding:30px">
            <p class="text-muted">Sin evidencias pendientes</p>
          </div>`;
        document.getElementById('s-evidencias').textContent = '0';
      }

      // Evaluaciones emitidas
      try {
        const evals = await evaluacionesApi.mis();
        document.getElementById('s-eval').textContent = Array.isArray(evals) ? evals.length : '—';
      } catch (_) {
        document.getElementById('s-eval').textContent = '—';
      }

    } catch (err) {
      toast(err.message, 'error');
    }
  }

  cargarDashboard();
</script>
</body>
</html>
