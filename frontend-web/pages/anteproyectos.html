<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="../favicon.jpg">
  <link rel="shortcut icon" href="../favicon.jpg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SIGERP — Anteproyectos</title>
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/components.css">
</head>
<body>

<div class="app-layout">
  <nav class="sidebar" id="sidebar"></nav>
  <div class="app-main">
    <header class="topbar">
      <div class="topbar-title">Revisión de anteproyectos</div>
    </header>
    <main class="app-content">

      <div class="card">
        <div class="card-header">
          <span class="card-title" id="card-title">Anteproyectos</span>
          <div class="tab-pills">
            <button class="tab-pill active" onclick="setFiltro('pendiente',this)">Pendientes</button>
            <button class="tab-pill" onclick="setFiltro('asignado',this)">Asignados</button>
            <button class="tab-pill" onclick="setFiltro('aprobado',this)">Aprobados</button>
            <button class="tab-pill" onclick="setFiltro('rechazado',this)">Rechazados</button>
            <button class="tab-pill" onclick="setFiltro('con_observaciones',this)">Con observaciones</button>
            <button class="tab-pill" onclick="setFiltro('',this)">Todos</button>
          </div>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Alumno</th>
                <th>Título</th>
                <th>Asesores propuestos</th>
                <th>Asesor asignado</th>
                <th>Fecha envío</th>
                <th>Estado</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody id="tbody-antep">
              <tr class="loading-row"><td colspan="7"><div class="spinner"></div></td></tr>
            </tbody>
          </table>
        </div>
      </div>

    </main>
  </div>
</div>

<!-- Modal: Ver PDF + Asignar asesor -->
<div class="modal-overlay" id="modal-asignar">
  <div class="modal" style="width:580px">
    <div class="modal-header">
      <span class="modal-title">Asignar asesor</span>
      <button class="modal-close" onclick="closeModal('modal-asignar')">×</button>
    </div>
    <div class="modal-body">

      <!-- Info del alumno -->
      <div style="background:var(--surface-alt,#f8f9fa);border-radius:8px;padding:14px;margin-bottom:16px">
        <div style="font-size:13px;color:var(--text-muted)">Alumno</div>
        <div id="as-alumno" style="font-weight:600;font-size:15px"></div>
        <div id="as-matricula" style="font-size:12px;color:var(--text-muted)"></div>
        <div style="font-size:13px;color:var(--text-muted);margin-top:10px">Título del anteproyecto</div>
        <div id="as-titulo" style="font-weight:600"></div>
      </div>

      <!-- Botón PDF -->
      <div style="margin-bottom:16px">
        <a id="as-pdf" href="#" target="_blank"
           style="display:inline-flex;align-items:center;gap:6px;padding:7px 16px;
                  background:#2563eb;color:#fff;border-radius:6px;font-size:13px;
                  font-weight:500;text-decoration:none;cursor:pointer">
          📄 Abrir PDF del anteproyecto
        </a>
      </div>

      <!-- Propuestas del alumno -->
      <div class="form-group">
        <label class="form-label">
          Asesores propuestos por el alumno
          <span style="font-weight:400;font-size:12px;color:var(--text-muted)"> (referencia)</span>
        </label>
        <div id="as-propuestos"
             style="padding:8px 12px;background:var(--surface-alt,#f8f9fa);
                    border-radius:6px;font-size:13px;color:var(--text-secondary)">
          —
        </div>
      </div>

      <!-- Selección de asesor -->
      <div class="form-group" style="margin-top:14px">
        <label class="form-label">Asesor a asignar <span style="color:red">*</span></label>
        <select class="form-control" id="as-asesor">
          <option value="">— Seleccionar asesor —</option>
        </select>
      </div>

      <input type="hidden" id="as-id" />

      <div class="form-footer">
        <button class="btn btn-secondary" onclick="closeModal('modal-asignar')">Cancelar</button>
        <button class="btn btn-primary" id="btn-asignar" onclick="asignar()">
          Asignar asesor
        </button>
      </div>
    </div>
  </div>
</div>

<div id="toast-container"></div>

<script src="../js/auth.js"></script>
<script src="../js/api/client.js"></script>
<script src="../js/components/sidebar.js"></script>
<script>
  checkAuth(['admin']);
  renderSidebar('anteproyectos.html');

  let _filtro = 'pendiente';

  async function cargar() {
    tablaLoading('tbody-antep', 7);
    try {
      const lista = await anteproyectosApi.listar(_filtro);
      const labels = {
        pendiente: 'Pendientes', asignado: 'Asignados',
        aprobado: 'Aprobados', rechazado: 'Rechazados',
        con_observaciones: 'Con observaciones', '': 'Todos'
      };
      document.getElementById('card-title').textContent =
        `${labels[_filtro] ?? 'Anteproyectos'} (${lista.length})`;
      renderTabla(lista);
    } catch (err) {
      tablaEmpty('tbody-antep', `Error: ${err.message}`, 7);
      toast(err.message, 'error');
    }
  }

  function renderTabla(lista) {
    if (!lista.length)
      return tablaEmpty('tbody-antep', 'No hay anteproyectos en este estado.', 7);

    document.getElementById('tbody-antep').innerHTML = lista.map(a => `
      <tr>
        <td>
          <div class="avatar-row">
            <div class="avatar">${iniciales(a.alumno || '?')}</div>
            <div>
              <div class="td-name">${a.alumno}</div>
              <div class="td-sub">${a.matricula}</div>
            </div>
          </div>
        </td>
        <td><div class="td-name">${a.titulo}</div></td>
        <td>
          <div class="text-sm" style="color:var(--text-muted);max-width:180px">
            ${a.asesores_propuestos || '<em style="opacity:.5">No especificó</em>'}
          </div>
        </td>
        <td>
          ${a.asesor_asignado
            ? `<span class="badge badge-teal">${a.asesor_asignado}</span>`
            : '<span class="text-muted text-sm">Sin asignar</span>'}
        </td>
        <td class="text-muted text-sm">${fmtFecha(a.fecha_envio)}</td>
        <td>${badgeEstado(a.estado)}</td>
        <td style="display:flex;gap:6px;flex-wrap:wrap">
          <button class="btn btn-sm btn-secondary"
            onclick="verPDF('${(a.ruta_archivo || '').replace(/\\/g, '/')}')">
            📄 PDF
          </button>
          ${a.estado === 'pendiente' ? `
            <button class="btn btn-sm btn-primary"
              onclick='abrirAsignar(${JSON.stringify(a)})'>
              Asignar asesor
            </button>
          ` : ''}
        </td>
      </tr>
    `).join('');
  }

  function verPDF(ruta) {
    anteproyectosApi.abrirPDF(ruta);
  }

  function setFiltro(filtro, btn) {
    _filtro = filtro;
    document.querySelectorAll('.tab-pill').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    cargar();
  }

  async function abrirAsignar(a) {
    document.getElementById('as-id').value          = a.id_anteproyecto;
    document.getElementById('as-alumno').textContent = a.alumno;
    document.getElementById('as-matricula').textContent = a.matricula;
    document.getElementById('as-titulo').textContent = a.titulo;
    // Guardar ruta para el botón del modal
    document.getElementById('as-pdf').dataset.ruta = (a.ruta_archivo || '').replace(/\\/g, '/');
    document.getElementById('as-propuestos').textContent = a.asesores_propuestos || 'No especificó';
    document.getElementById('as-asesor').innerHTML  = '<option value="">Cargando…</option>';
    openModal('modal-asignar');

    try {
      const asesores = await usuariosApi.listar('asesor');
      document.getElementById('as-asesor').innerHTML =
        '<option value="">— Seleccionar asesor —</option>' +
        asesores.map(a =>
          `<option value="${a.id_usuario}">${a.nombre}${a.area ? ' — ' + a.area : ''}</option>`
        ).join('');
    } catch (_) {
      document.getElementById('as-asesor').innerHTML = '<option value="">Error al cargar</option>';
    }
  }

  function abrirPDFModal() {
    const ruta = document.getElementById('as-pdf').dataset.ruta;
    if (ruta) anteproyectosApi.abrirPDF(ruta);
  }

  async function asignar() {
    const id       = parseInt(document.getElementById('as-id').value);
    const idAsesor = parseInt(document.getElementById('as-asesor').value);
    if (!idAsesor) return toast('Selecciona un asesor.', 'warn');

    const btn = document.getElementById('btn-asignar');
    btn.disabled = true;
    try {
      await anteproyectosApi.asignarAsesor(id, idAsesor);
      toast('Asesor asignado. El asesor revisará el anteproyecto.');
      closeModal('modal-asignar');
      cargar();
    } catch (err) {
      toast(err.message, 'error');
    } finally {
      btn.disabled = false;
    }
  }

  document.querySelectorAll('.modal-overlay').forEach(o =>
    o.addEventListener('click', e => { if (e.target === o) o.classList.remove('open'); })
  );

  cargar();
</script>
</body>
</html>
