name: sigerp_alumno
description: SIGERP - Sistema de Gestión de Residencias Profesionales (App Alumno)
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.1
  provider: ^6.1.2
  shared_preferences: ^2.2.3
  cupertino_icons: ^1.0.6
  file_picker: ^8.0.3
  flutter_svg: ^2.0.10
  lottie: ^3.1.2

dev_dependencies:
  flutter_launcher_icons: ^0.14.1
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/icon.jpg"
  min_sdk_android: 21