name: sigerp_alumno
description: SIGERP - Sistema de Gestión de Residencias Profesionales (App Alumno)
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # HTTP & networking
  http: ^1.2.1
  
  # State management
  provider: ^6.1.2
  
  # Storage local
  shared_preferences: ^2.2.3
  
  # UI components
  cupertino_icons: ^1.0.6
  
  # File picking
  file_picker: ^8.0.3
  
  # Iconos
  flutter_svg: ^2.0.10
  
  # Animaciones
  lottie: ^3.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
